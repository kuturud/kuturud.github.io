baseURL = "https://example.ashvikdubey.com/"
languageCode = "en-uk"
title = "Ashvik Dubey"

paginate = 5
theme = "hugo-PaperMod"
enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
disableXML = true

[languages.en]
languageName = "English"
weight = 1

[[languages.en.menu.main]]
name = "Home"
url = "/"
weight = 5

[[languages.en.menu.main]]
name = "Posts"
url = "/tags/posts/"
weight = 5

[[languages.en.menu.main]]
name = "Search"
url = "search/"
weight = 10

[outputs]
home = [ "HTML", "RSS", "JSON" ]

[params]
env = "production"
description = ""
author = "Ashvik Dubey"
defaultTheme = "auto"
ShowShareButtons = true
ShowReadingTime = true
displayFullLangName = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
images = [ "papermod-cover.png" ]

  [params.profileMode]
  enabled = false
  title = "PaperMod"
  imageUrl = "#"
  imageTitle = "my image"

    [[params.profileMode.buttons]]
    name = "Archives"
    url = "archives"

    [[params.profileMode.buttons]]
    name = "Tags"
    url = "tags"

  [params.homeInfoParams]
  Title = "Welcome to my website!"
  Content = """
Here youll find posts about tech and music. I hope you like it.
"""

  [[params.socialIcons]]
  name = "YouTube"
  url = "https://www.youtube.com/channel/UCWEHTissp4tyVQAfbJGQlPQ"

  [[params.socialIcons]]
  name = "Roblox"
  url = "https://www.roblox.com/users/1923416904/profile"

  [[params.socialIcons]]
  name = "Twitch"
  url = "https://www.twitch.tv/ashmakes"

  [params.editPost]
  URL = "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
  Text = "Suggest Changes"
  appendFilePath = true

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[markup.goldmark.renderer]
unsafe = true

[privacy.vimeo]
disabled = false
simple = true

[privacy.twitter]
disabled = false
enableDNT = true
simple = true

[privacy.instagram]
disabled = false
simple = true

[privacy.youtube]
disabled = false
privacyEnhanced = true

[services.instagram]
disableInlineCSS = true

[services.twitter]
disableInlineCSS = true
